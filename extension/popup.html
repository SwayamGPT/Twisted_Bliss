<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Twisted Bliss IG Importer</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      width: 320px;
      margin: 0;
      padding: 16px;
      background-color: #f8fafc;
      color: #0f172a;
    }
    h2 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 18px;
      color: #0369a1;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #475569;
    }
    input[type="text"], textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
    }
    textarea {
      resize: vertical;
      min-height: 50px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #0284c7;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #0369a1;
    }
    button:disabled {
      background-color: #94a3b8;
      cursor: not-allowed;
    }
    #status {
      margin-top: 12px;
      font-size: 13px;
      text-align: center;
      font-weight: 500;
    }
    .success { color: #16a34a; }
    .error { color: #dc2626; }
    .helper-text {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <h2>🧶 Twisted Bliss Importer</h2>
  <p class="helper-text">Select order text in Instagram DM and open this popup, or paste it manually.</p>
  
  <div class="form-group">
    <label>Customer Name</label>
    <input type="text" id="custName" placeholder="E.g. Jane Doe" />
  </div>
  
  <div class="form-group">
    <label>Phone Number (Optional)</label>
    <input type="text" id="custPhone" placeholder="E.g. +91 9876543210" />
  </div>

  <div class="form-group">
    <label>Address (Optional)</label>
    <textarea id="custAddr" placeholder="Delivery address"></textarea>
  </div>

  <div class="form-group">
    <label>Products / Raw Text selected</label>
    <textarea id="rawText" placeholder="Pikachu keychain - 1, Blue Whale - 2"></textarea>
  </div>

  <div class="form-group">
    <label>Total Amount Collected</label>
    <input type="text" id="totalAmount" placeholder="E.g. 500" value="0" />
  </div>

  <button id="importBtn">Send to Dashboard</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
